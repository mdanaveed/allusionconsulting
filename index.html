<html lang="en">

    nav a:hover {

      background: #111;
      color: #fff;
    }
    .hero h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .primary-btn {

      color: #fff;
    }
    .secondary-btn {

      color: #fff;
    }

    }

      margin-top: 25px;
      font-size: 1.2rem;
    }

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

      margin-top: 20px;
    }
    .card {

      padding: 20px;
      border: 1px solid #e0e0e0;
    }
    .card h3 {
      margin-top: 0;
      color: #c62828;
    }
    .badge-row {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #555;
    }
    .badge {
      display: inline-block;
      background: #eee;
      border-radius: 20px;
      padding: 4px 10px;
      margin: 4px 4px 0 0;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      color: #666;
    }
    footer a {
      color: #c62828;
      text-decoration: none;
    }
